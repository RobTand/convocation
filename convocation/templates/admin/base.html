<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}{{ site_title }}{% endblock %} — ConvocAtIon</title>
    <style>
        :root {
            --bg: #0f1117;
            --bg-surface: #1a1d27;
            --bg-elevated: #242736;
            --border: #2d3148;
            --text: #e4e6f0;
            --text-muted: #8b8fa3;
            --primary: #6366f1;
            --primary-hover: #818cf8;
            --success: #22c55e;
            --danger: #ef4444;
            --warning: #f59e0b;
            --font: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
            --font-mono: 'SF Mono', 'Fira Code', 'Cascadia Code', monospace;
            --radius: 8px;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: var(--font);
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
        }

        /* Sidebar */
        .sidebar {
            width: 240px;
            background: var(--bg-surface);
            border-right: 1px solid var(--border);
            padding: 1.5rem 0;
            display: flex;
            flex-direction: column;
            position: fixed;
            height: 100vh;
            z-index: 100;
        }

        .sidebar-brand {
            padding: 0 1.25rem 1.5rem;
            border-bottom: 1px solid var(--border);
            margin-bottom: 1rem;
        }

        .sidebar-brand h1 {
            font-size: 1.25rem;
            font-weight: 700;
            background: linear-gradient(135deg, #6366f1, #a855f7);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .sidebar-brand .subtitle {
            font-size: 0.75rem;
            color: var(--text-muted);
            margin-top: 0.25rem;
        }

        .sidebar-nav {
            flex: 1;
            padding: 0 0.75rem;
        }

        .sidebar-nav a {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            padding: 0.625rem 0.75rem;
            color: var(--text-muted);
            text-decoration: none;
            border-radius: var(--radius);
            font-size: 0.875rem;
            transition: all 0.15s;
        }

        .sidebar-nav a:hover, .sidebar-nav a.active {
            color: var(--text);
            background: var(--bg-elevated);
        }

        .sidebar-nav a.active {
            color: var(--primary);
        }

        .sidebar-footer {
            padding: 1rem 1.25rem;
            border-top: 1px solid var(--border);
        }

        .sidebar-footer .user-info {
            font-size: 0.8rem;
            color: var(--text-muted);
        }

        .sidebar-footer .user-name {
            color: var(--text);
            font-weight: 500;
        }

        /* Main content */
        .main {
            margin-left: 240px;
            flex: 1;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .topbar {
            padding: 1rem 2rem;
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: var(--bg-surface);
        }

        .topbar h2 {
            font-size: 1.125rem;
            font-weight: 600;
        }

        .content {
            flex: 1;
            padding: 2rem;
        }

        /* Buttons */
        .btn {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.5rem 1rem;
            border-radius: var(--radius);
            border: 1px solid var(--border);
            background: var(--bg-elevated);
            color: var(--text);
            font-size: 0.875rem;
            cursor: pointer;
            transition: all 0.15s;
            text-decoration: none;
            font-family: var(--font);
        }

        .btn:hover { border-color: var(--text-muted); }
        .btn-primary { background: var(--primary); border-color: var(--primary); color: white; }
        .btn-primary:hover { background: var(--primary-hover); }
        .btn-success { background: var(--success); border-color: var(--success); color: white; }
        .btn-danger { background: var(--danger); border-color: var(--danger); color: white; }
        .btn-sm { padding: 0.375rem 0.75rem; font-size: 0.8rem; }

        /* Forms */
        input, textarea, select {
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 0.625rem 0.875rem;
            color: var(--text);
            font-size: 0.875rem;
            font-family: var(--font);
            width: 100%;
            transition: border-color 0.15s;
        }

        input:focus, textarea:focus, select:focus {
            outline: none;
            border-color: var(--primary);
        }

        label {
            font-size: 0.8rem;
            font-weight: 500;
            color: var(--text-muted);
            margin-bottom: 0.375rem;
            display: block;
        }

        .form-group { margin-bottom: 1rem; }

        /* Cards */
        .card {
            background: var(--bg-surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 1.5rem;
        }

        /* Diff view */
        .diff {
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 1rem;
            font-family: var(--font-mono);
            font-size: 0.8rem;
            line-height: 1.6;
            overflow-x: auto;
            white-space: pre;
        }

        .diff-add { color: var(--success); }
        .diff-del { color: var(--danger); }
        .diff-header { color: var(--primary); }

        /* Utility */
        .hidden { display: none !important; }
        .text-muted { color: var(--text-muted); }
        .text-sm { font-size: 0.8rem; }
        .mt-1 { margin-top: 0.5rem; }
        .mt-2 { margin-top: 1rem; }
        .mt-4 { margin-top: 2rem; }
        .mb-2 { margin-bottom: 1rem; }
        .gap-2 { gap: 1rem; }
        .flex { display: flex; }
        .items-center { align-items: center; }
        .justify-between { justify-content: space-between; }

        /* Toast notifications */
        .toast-container {
            position: fixed;
            top: 1rem;
            right: 1rem;
            z-index: 1000;
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }

        .toast {
            padding: 0.75rem 1rem;
            border-radius: var(--radius);
            background: var(--bg-elevated);
            border: 1px solid var(--border);
            font-size: 0.875rem;
            animation: slideIn 0.2s ease;
            max-width: 400px;
        }

        .toast-success { border-color: var(--success); }
        .toast-error { border-color: var(--danger); }

        @keyframes slideIn {
            from { transform: translateX(100%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }

        /* Responsive */
        @media (max-width: 768px) {
            .sidebar {
                width: 100%;
                height: auto;
                position: fixed;
                bottom: 0;
                top: auto;
                flex-direction: row;
                padding: 0;
                border-right: none;
                border-top: 1px solid var(--border);
                z-index: 100;
            }
            .sidebar-brand, .sidebar-footer { display: none; }
            .sidebar-nav {
                display: flex;
                flex-direction: row;
                padding: 0;
                width: 100%;
                justify-content: space-around;
            }
            .sidebar-nav a {
                flex-direction: column;
                justify-content: center;
                align-items: center;
                padding: 0.5rem 0.25rem;
                font-size: 0.65rem;
                gap: 0.2rem;
                flex: 1;
                text-align: center;
                border-radius: 0;
            }
            .sidebar-nav a span { display: block; font-size: 0.6rem; }
            .sidebar-nav a svg { width: 20px; height: 20px; }
            .main { margin-left: 0; margin-bottom: 60px; }
            .content { padding: 1rem; }
            .topbar { padding: 0.75rem 1rem; }
            .topbar h2 { font-size: 1rem; }
        }
    </style>
    {% block head %}{% endblock %}
</head>
<body>
    <nav class="sidebar" id="sidebar">
        <div class="sidebar-brand">
            <h1>Convoc<span style="-webkit-text-fill-color:#ef4444">A</span>t<span style="-webkit-text-fill-color:#ef4444">I</span>on</h1>
            <div class="subtitle" id="site-title">{{ site_title }}</div>
        </div>
        <div class="sidebar-nav">
            <a href="/admin" data-page="home">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/></svg>
                <span>Dashboard</span>
            </a>
            <a href="/admin/chat" data-page="chat">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z"/></svg>
                <span>Chat</span>
            </a>
            <a href="/admin/history" data-page="history">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
                <span>History</span>
            </a>
            <a href="/admin/audit" data-page="audit">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg>
                <span>Audit Log</span>
            </a>
            <a href="/" target="_blank" data-page="site">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="2" y1="12" x2="22" y2="12"/><path d="M12 2a15.3 15.3 0 014 10 15.3 15.3 0 01-4 10 15.3 15.3 0 01-4-10 15.3 15.3 0 014-10z"/></svg>
                <span>View Site</span>
            </a>
            <a href="/admin/settings" data-page="settings">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 010 2.83 2 2 0 01-2.83 0l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-4 0v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83-2.83l.06-.06A1.65 1.65 0 004.68 15a1.65 1.65 0 00-1.51-1H3a2 2 0 010-4h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 012.83-2.83l.06.06A1.65 1.65 0 009 4.68a1.65 1.65 0 001-1.51V3a2 2 0 014 0v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 2.83l-.06.06A1.65 1.65 0 0019.4 9a1.65 1.65 0 001.51 1H21a2 2 0 010 4h-.09a1.65 1.65 0 00-1.51 1z"/></svg>
                <span>Settings</span>
            </a>
        </div>
        <div class="sidebar-footer">
            <div class="user-info">
                <div class="user-name" id="user-display-name">—</div>
                <div class="text-sm text-muted" id="user-role">—</div>
            </div>
            <button class="btn btn-sm mt-1" onclick="logout()" style="width:100%">Sign out</button>
        </div>
    </nav>

    <main class="main">
        {% block content %}{% endblock %}
    </main>

    <div class="toast-container" id="toasts"></div>

    <script>
        // Auth check
        async function checkAuth() {
            try {
                const resp = await fetch('/auth/me');
                if (!resp.ok) {
                    if (!window.location.pathname.startsWith('/admin/login') && !window.location.pathname.startsWith('/admin/signup')) {
                        window.location.href = '/admin/login';
                    }
                    return null;
                }
                const user = await resp.json();
                document.getElementById('user-display-name').textContent = user.display_name;
                document.getElementById('user-role').textContent = user.role;
                return user;
            } catch {
                return null;
            }
        }

        async function logout() {
            await fetch('/auth/logout', { method: 'POST' });
            window.location.href = '/admin/login';
        }

        function toast(message, type = 'success') {
            const container = document.getElementById('toasts');
            const el = document.createElement('div');
            el.className = `toast toast-${type}`;
            el.textContent = message;
            container.appendChild(el);
            setTimeout(() => el.remove(), 4000);
        }

        // Highlight active nav
        document.querySelectorAll('.sidebar-nav a').forEach(a => {
            if (a.getAttribute('href') === window.location.pathname) {
                a.classList.add('active');
            }
        });

        // Format diff HTML
        function formatDiff(diffText) {
            if (!diffText) return '<span class="text-muted">No changes</span>';
            return diffText.split('\n').map(line => {
                if (line.startsWith('+')) return `<span class="diff-add">${escHtml(line)}</span>`;
                if (line.startsWith('-')) return `<span class="diff-del">${escHtml(line)}</span>`;
                if (line.startsWith('@@') || line.startsWith('diff')) return `<span class="diff-header">${escHtml(line)}</span>`;
                return escHtml(line);
            }).join('\n');
        }

        function escHtml(s) {
            return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
        }

        checkAuth();
    </script>
    {% block scripts %}{% endblock %}
</body>
</html>
