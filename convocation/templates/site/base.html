<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}{{ site_title }}{% endblock %}</title>
    <meta name="description" content="{{ site_description }}">
    <style>
        :root {
            --bg: #0c0e14;
            --bg-card: #141620;
            --bg-hover: #1a1d2a;
            --border: #252840;
            --text: #e2e4ef;
            --text-muted: #7c809a;
            --accent: #6366f1;
            --accent-light: #818cf8;
            --success: #22c55e;
            --font: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: var(--font);
            background: var(--bg);
            color: var(--text);
            line-height: 1.6;
        }

        .container { max-width: 960px; margin: 0 auto; padding: 0 1.5rem; }

        /* Header */
        header {
            border-bottom: 1px solid var(--border);
            padding: 1.25rem 0;
        }

        header .container {
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .site-brand {
            font-size: 1.25rem;
            font-weight: 700;
            color: var(--text);
            text-decoration: none;
            background: linear-gradient(135deg, #6366f1, #a855f7);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        nav a {
            color: var(--text-muted);
            text-decoration: none;
            font-size: 0.875rem;
            margin-left: 1.5rem;
            transition: color 0.15s;
        }

        nav a:hover { color: var(--text); }

        /* Main */
        main { padding: 2rem 0; min-height: 70vh; }

        h1 { font-size: 1.75rem; font-weight: 700; margin-bottom: 1rem; }
        h2 { font-size: 1.25rem; font-weight: 600; margin-bottom: 0.75rem; }

        /* Cards */
        .card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 1.25rem 1.5rem;
            margin-bottom: 1rem;
            transition: border-color 0.15s;
        }

        .card:hover { border-color: var(--accent); }

        .card-title {
            font-size: 1rem;
            font-weight: 600;
            margin-bottom: 0.375rem;
        }

        .card-title a {
            color: var(--text);
            text-decoration: none;
        }

        .card-title a:hover { color: var(--accent-light); }

        .card-meta {
            font-size: 0.8rem;
            color: var(--text-muted);
            margin-bottom: 0.75rem;
        }

        .card-body {
            font-size: 0.9rem;
            color: var(--text);
            line-height: 1.7;
        }

        .card-body p { margin-bottom: 0.75rem; }
        .card-body a { color: var(--accent-light); }

        .badge {
            display: inline-block;
            font-size: 0.7rem;
            padding: 0.125rem 0.5rem;
            border-radius: 9999px;
            background: var(--accent);
            color: white;
            font-weight: 500;
        }

        /* Footer */
        footer {
            border-top: 1px solid var(--border);
            padding: 2rem 0;
            text-align: center;
            color: var(--text-muted);
            font-size: 0.8rem;
        }

        footer a { color: var(--accent-light); text-decoration: none; }

        /* Sections */
        .section { margin-bottom: 3rem; }
        .section-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 1rem;
        }

        /* Grid */
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 1rem; }

        /* Hamburger */
        .nav-toggle {
            display: none;
            background: none;
            border: none;
            color: var(--text);
            cursor: pointer;
            padding: 0.5rem;
            margin: -0.5rem;
        }

        /* Responsive */
        @media (max-width: 640px) {
            .container { padding: 0 1rem; }
            h1 { font-size: 1.375rem; }
            .grid { grid-template-columns: 1fr; }
            .card { padding: 1rem 1.125rem; }

            .nav-toggle { display: block; }

            nav {
                display: none;
                position: absolute;
                top: 100%;
                left: 0;
                right: 0;
                background: var(--bg);
                border-bottom: 1px solid var(--border);
                padding: 0.5rem 0;
                z-index: 50;
            }

            nav.open { display: block; }

            nav a {
                display: block;
                margin: 0;
                padding: 0.75rem 1.5rem;
                font-size: 1rem;
            }

            nav a:hover { background: var(--bg-card); }
        }
    </style>
    {% block head %}{% endblock %}
</head>
<body>
    <header>
        <div class="container" style="position:relative;">
            <a href="/" class="site-brand">{{ site_title }}</a>
            <button class="nav-toggle" onclick="document.querySelector('nav').classList.toggle('open')" aria-label="Menu">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
            </button>
            <nav>
                <a href="/">Home</a>
                <a href="/announcements/">Announcements</a>
                <a href="/events/">Events</a>
                <a href="/members/">Members</a>
                {% for item in nav_items %}
                <a href="/{{ item.slug }}.html">{{ item.title }}</a>
                {% endfor %}
            </nav>
        </div>
    </header>

    <main>
        <div class="container">
            {% block main %}{% endblock %}
        </div>
    </main>

    <footer>
        <div class="container">
            <p>{{ site_title }} &mdash; Powered by <a href="/about/convocation">Convoc<span style="color:#ef4444">A</span>t<span style="color:#ef4444">I</span>on</a></p>
        </div>
    </footer>

    {% if vapid_public_key %}
    <script>
        // Service worker for push notifications
        if ('serviceWorker' in navigator && 'PushManager' in window) {
            navigator.serviceWorker.register('/static/sw.js').then(reg => {
                reg.pushManager.getSubscription().then(sub => {
                    if (!sub) {
                        reg.pushManager.subscribe({
                            userVisibleOnly: true,
                            applicationServerKey: '{{ vapid_public_key }}'
                        }).then(sub => {
                            fetch('/api/push/subscribe', {
                                method: 'POST',
                                headers: {'Content-Type': 'application/json'},
                                body: JSON.stringify({
                                    endpoint: sub.endpoint,
                                    keys: { p256dh: btoa(String.fromCharCode(...new Uint8Array(sub.getKey('p256dh')))),
                                            auth: btoa(String.fromCharCode(...new Uint8Array(sub.getKey('auth')))) }
                                })
                            });
                        });
                    }
                });
            });
        }
    </script>
    {% endif %}
</body>
</html>
